# 仮想環境の基本

## 仮想環境を作る　← これが「冷蔵庫を作る」瞬間
PowerShellで以下を入力
PowerShell
python -m venv .venv
.venv ← これが冷蔵庫の名前（よく使われる名前）

## PowerShellの場合、最初に1回だけ設定が必要
PowerShell
Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser

## 仮想環境に入る時(毎回やるコマンド)
PowerShell
.\.venv\Scripts\Activate.ps1
成功すると
(.venv) PS C:\Users\君の名前\my_project>

## 今どのPythonを使ってるか確認（超大事！）
PowerShell
python -V
例) Python 3.12.5 とか出る
python -c "import sys; print(sys.executable)"
最後のパスに .venv と入っていればOK！

## ライブラリインストール(仮想環境.venvの中だけで有効)
PowerShell
例)pip install requests→ これで .venv の中

## 新しいライブラリ入れたら最後に
pip freeze > requirements.txt
（これで「今入ってるライブラリ一覧」をメモする）

## 他の人に渡すときや別のPCで動かすときは
pip install -r requirements.txt で同じ環境が作れる

## 仮想環境を終了する（普通のモードに戻る）
PowerShell
deactivate
(.venv) が消えたら終了