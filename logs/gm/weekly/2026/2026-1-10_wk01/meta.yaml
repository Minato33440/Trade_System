signals:
  gold_bid:
    state: watch
    thesis: >
      Risk-off初動の避難先が米国債一択になりにくく、"守り"が金へシフトする可能性。
      株が底堅いのに金も強い場合は「守りながら攻める」局面＝後半で調整リスクが溜まりやすい。
    triggers:
      - Gold (XAUUSD) remains firm while equities stay elevated and VIX stays low
      - Gold breaks/holds above prior weekly breakout zone (buy-the-dip behavior)
    invalidation:
      - Gold loses key support and fails to rebound on risk-off headlines (weak bid)
    implications:
      - Hedge preference: Gold > duration as mid-term risk buffer
      - If gold_bid strengthens with yields_sticky, equity valuation stress rises

  yields_sticky:
    state: on
    thesis: >
      “景気指標が弱いのに長期金利が落ちない”＝タームプレミアム/供給要因/インフレ粘着で、
      株のバリュエーションに中期ストレスが溜まりやすい。
    triggers:
      - US10Y holds around ~4.17-4.20 even after soft labor data (no meaningful flight-to-duration)
      - 2-10 inversion continues to normalize (less negative) without growth re-acceleration
    invalidation:
      - Clear risk-off bid in Treasuries: US10Y breaks down and holds below key range supports
    implications:
      - Prefer “no chase”; buy dips only with defined levels
      - Rotation tends to accelerate (growth lag / defensives & cyclicals selectively lead)

  breadth_weakening:
    state: watch
    thesis: >
      指数は高値圏でも、値下がり銘柄増・グロース弱いなど“中身の劣化”が続くと、
      遅れて調整が出やすい（index-resilient / internals-fragile）。
    triggers:
      - Advancers/decliners deteriorate while headline indices hold highs
      - Mega-cap / FANG underperform while SOX/R2K/Transports/Utilities lead (rotation uneven)
      - Japan: index high but broad weakness persists (many decliners / growth weak)
    invalidation:
      - Broad participation returns (breadth improves) with leadership broadening
    implications:
      - Raise quality bar for adds; favor strongest leaders only
      - Be ready for “slow bleed” or abrupt de-risk when catalysts hit

  jan_flow_support:
    state: on
    thesis: >
      年初フロー（新規資金・リバランス・機械的リスク増加）が下支えとなり、
      1月は下げにくいが、押し目は“条件付き”で拾うフェーズ。
    triggers:
      - Indices remain supported despite event risk (NFP/Fed headlines)
      - Volatility stays compressed (low VIX/MOVE) supporting systematic exposure
    invalidation:
      - Vol spikes + breakdown below key daily levels (support/21MA) with follow-through selling
    implications:
      - Maintain core but avoid leverage; prioritize staged entries on pullbacks
      - Use event windows as add/reduce gates

  earnings_risk_Feb:
    state: watch
    thesis: >
      2月以降、決算/ガイダンスで“指数は耐えるが個別・セクターで分解が進む”調整が入りやすい。
      低ボラ＋金利粘り＋ローテ加速の組み合わせは、ガイダンスショックに弱い。
    triggers:
      - Negative guidance surprises increase while indices are still elevated
      - Leadership churn accelerates (winners rotate rapidly; laggards expand)
      - Valuation-sensitive sectors underperform as yields stay sticky
    invalidation:
      - Earnings season passes with guidance stable and breadth improving
    implications:
      - Plan de-risk rules into earnings window; avoid chasing extended names pre-results
      - Prefer additions after reactions (post-earnings confirmation), not before
